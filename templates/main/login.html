{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Alex Morgan Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body class="auth-page">
    <main class="auth-shell">
        <a class="auth-logo" href="{% url 'main:home' %}">AM<span>.</span></a>
        <section class="auth-card reveal visible">
            <div class="auth-intro">
                <p class="eyebrow">Welcome Back</p>
                <h1>Login to your account.</h1>
                <p>Access the private side of this portfolio experience with your credentials.</p>
            </div>

            <form class="auth-form" method="post" novalidate>
                {% csrf_token %}
                {% if form.non_field_errors %}
                <div class="auth-errors">
                    {{ form.non_field_errors }}
                </div>
                {% endif %}

                <label>
                    <span>Username</span>
                    {{ form.username }}
                    {{ form.username.errors }}
                </label>
                <label>
                    <span>Password</span>
                    {{ form.password }}
                    {{ form.password.errors }}
                </label>

                <button class="btn primary" type="submit">Login</button>
            </form>

            <p class="auth-switch">
                New here? <a href="{% url 'main:signup' %}">Create an account</a>
            </p>
        </section>
    </main>
</body>
</html>
